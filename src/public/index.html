<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WACAPI Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container navbar-content">
            <span class="brand">WACAPI Admin</span>
            <div class="nav-links">
                <button id="nav-clients" class="btn btn-text active">Clients</button>
                <button id="nav-history" class="btn btn-text">History</button>
            </div>
            <div id="admin-status" class="admin-status">
                <span class="status-indicator"></span>
                Admin Token Set
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Client Management Section -->
        <section id="clients-section">
            <div class="section-header">
                <h2>Clients</h2>
                <button id="btn-add-client" class="btn btn-primary">Add Client</button>
            </div>

            <div id="client-list" class="grid">
                <!-- Clients will be rendered here -->
                <div class="loading">Loading clients...</div>
            </div>
        </section>

        <!-- Knowledge Management Section (Hidden until client selected) -->
        <section id="knowledge-section" class="hidden">
            <div class="section-header">
                <div class="title-with-back">
                    <button id="btn-back-clients" class="btn btn-text">&larr; Back</button>
                    <h2>Knowledge: <span id="current-client-name"></span></h2>
                </div>
                <button id="btn-add-knowledge" class="btn btn-primary">Add Knowledge</button>
            </div>

            <div class="client-info-card">
                <p><strong>API Key:</strong> <code id="current-client-key"></code> <button
                        class="btn btn-small btn-copy" data-target="current-client-key">Copy</button></p>
            </div>

            <div id="knowledge-list" class="list">
                <!-- Knowledge items will be rendered here -->
            </div>
        </section>

        <!-- History Section -->
        <section id="history-section" class="hidden">
            <div class="section-header">
                <h2>Chat History</h2>
                <div class="search-container">
                    <input type="text" id="search-history" placeholder="Search by phone number...">
                </div>
            </div>

            <div class="history-layout">
                <div id="conversation-list" class="sidebar-list">
                    <!-- Conversations will be listed here -->
                    <p class="loading">Select a client to see history</p>
                </div>
                <div class="chat-area">
                    <div id="chat-header" class="chat-header hidden">
                        <div class="chat-title">
                            <h3 id="chat-user-number"></h3>
                            <span id="chat-status" class="badge"></span>
                        </div>
                        <div class="chat-controls">
                            <label class="switch-label">
                                Human Takeover:
                                <input type="checkbox" id="check-human-takeover">
                            </label>
                        </div>
                    </div>
                    <div id="message-container" class="message-container">
                        <p class="empty-state">Select a conversation to view messages</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal for Adding/Editing Client -->
    <div id="modal-client" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-client-title">Add New Client</h3>
            <form id="form-client">
                <input type="hidden" id="client-id">
                <div class="form-group">
                    <label for="client-name">Name</label>
                    <input type="text" id="client-name" required placeholder="e.g. Furniture Store">
                </div>
                <div class="form-group">
                    <label for="wa-biz-id">WA Business ID</label>
                    <input type="text" id="wa-biz-id" required>
                </div>
                <div class="form-group">
                    <label for="wa-phone-id">WA Phone Number ID</label>
                    <input type="text" id="wa-phone-id" required>
                </div>
                <div class="form-group">
                    <label for="wa-token">Access Token</label>
                    <textarea id="wa-token" required rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="system-prompt">System Prompt</label>
                    <textarea id="system-prompt" rows="4">You are a helpful WhatsApp assistant.</textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary btn-close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Client</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Adding Knowledge -->
    <div id="modal-knowledge" class="modal hidden">
        <div class="modal-content">
            <h3>Add Knowledge</h3>
            <form id="form-knowledge">
                <div class="form-group">
                    <label for="kn-title">Title</label>
                    <input type="text" id="kn-title" required placeholder="e.g. Pricing Policy">
                </div>
                <div class="form-group">
                    <label for="kn-type">Type</label>
                    <select id="kn-type">
                        <option value="prompt">Prompt (Always included)</option>
                        <option value="rag">RAG (Similarity search)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="kn-content">Content</label>
                    <textarea id="kn-content" required rows="6"
                        placeholder="The details of the knowledge..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary btn-close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Knowledge</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Showing API Key -->
    <div id="modal-key" class="modal hidden">
        <div class="modal-content">
            <h3>API Key Generated</h3>
            <p class="warning-text">IMPORTANT: Copy this key now. It will not be shown again.</p>
            <div class="key-display">
                <code id="new-api-key"></code>
                <button class="btn btn-primary btn-small btn-copy" data-target="new-api-key">Copy Key</button>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary btn-close-modal">I have saved it</button>
            </div>
        </div>
    </div>

    <!-- Toast for Notifications -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>

</html>
