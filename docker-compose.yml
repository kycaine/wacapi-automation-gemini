version: '3.9'

services:
  # ---- PostgreSQL ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wacapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-wacapi}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-wacapi}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wacapi_net

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: wacapi_redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wacapi_net

  # ---- Application ----
  app:
    profiles: [ "manual" ]
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: wacapi_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wacapi_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  wacapi_net:
    driver: bridge
